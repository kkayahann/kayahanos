name: KAYAHANOS FINAL APK FACTORY

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. SOURCE
    # =========================
    - name: Checkout Repo
      uses: actions/checkout@v4

    # =========================
    # 2. JAVA ENV
    # =========================
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # =========================
    # 3. GRADLE CACHE (SAFE)
    # =========================
    - name: Gradle Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-final-${{ runner.os }}

    # =========================
    # 4. PERMISSION FIX
    # =========================
    - name: Make Gradle Executable
      run: chmod +x android/gradlew

    # =========================
    # 5. CLEAN BUILD ENGINE
    # =========================
    - name: CLEAN BUILD (TRY 1)
      id: build1
      run: |
        cd android
        ./gradlew clean assembleDebug --no-daemon || exit 1

    # =========================
    # 6. SELF HEAL RETRY
    # =========================
    - name: RECOVERY BUILD (TRY 2)
      if: failure()
      run: |
        echo "RECOVERY MODE ACTIVE"
        rm -rf ~/.gradle/caches || true
        cd android
        ./gradlew clean assembleDebug --no-daemon

    # =========================
    # 7. VALIDATION (CRITICAL)
    # =========================
    - name: VERIFY APK EXISTS
      run: |
        FILE="android/app/build/outputs/apk/debug/app-debug.apk"

        if [ ! -f "$FILE" ]; then
          echo "FATAL: APK NOT GENERATED"
          exit 1
        fi

        echo "APK OK"

    # =========================
    # 8. BUILD REPORT
    # =========================
    - name: Create Report
      run: |
        mkdir -p reports
        echo "BUILD SUCCESS" > reports/status.txt
        date >> reports/status.txt
        echo "COMMIT: $GITHUB_SHA" >> reports/status.txt

    # =========================
    # 9. UPLOAD APK
    # =========================
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KAYAHANOS-APK-FINAL
        path: android/app/build/outputs/apk/debug/app-debug.apk

    # =========================
    # 10. UPLOAD REPORT
    # =========================
    - name: Upload Build Report
      uses: actions/upload-artifact@v4
      with:
        name: BUILD-REPORT
        path: reports/status.txt

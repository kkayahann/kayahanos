name: KAYAHANOS SELF-HEALING APK FACTORY

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}

      - name: Prepare Gradle
        run: chmod +x android/gradlew

      # =========================
      # BUILD ENGINE (SAFE MODE)
      # =========================
      - name: Build APK (TRY 1)
        id: build1
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon || exit 1

      - name: Retry Build (TRY 2 - AUTO FIX)
        if: failure()
        run: |
          echo "BUILD FAILED → CLEANING CACHE"
          rm -rf ~/.gradle/caches || true
          cd android
          ./gradlew clean assembleDebug --no-daemon

      - name: Verify APK Output
        run: |
          if [ ! -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK NOT GENERATED → FAIL STATE"
            exit 1
          fi

      - name: Build Report
        run: |
          echo "BUILD SUCCESS" > build-status.txt
          echo "APK GENERATED OK" >> build-status.txt
          date >> build-status.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KayahanOS-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-status.txt
